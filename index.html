<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORA ULTIMATE | النتائج الحية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #05070a;
            --card: #121820;
            --accent: #00ff88;
            --text: #ffffff;
            --dim: #a0aec0;
            --danger: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body { background: var(--bg); color: var(--text); padding-bottom: 80px; }

        /* الهيدر العلوي */
        header {
            background: rgba(18, 24, 32, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #1e293b;
        }

        .logo { font-size: 1.4rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }

        /* شريط الدوريات السريع */
        .leagues-nav {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 12px;
            scrollbar-width: none;
        }
        .league-chip {
            background: var(--card);
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
            font-size: 0.85rem;
            border: 1px solid #2d3748;
            cursor: pointer;
        }
        .league-chip.active { background: var(--accent); color: #000; font-weight: bold; }

        /* حاوية المباريات */
        .container { padding: 0 15px; }

        .match-card {
            background: var(--card);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            border: 1px solid #1e293b;
        }

        .team { flex: 1; text-align: center; }
        .team img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; }
        .team span { display: block; font-size: 0.9rem; font-weight: 600; }

        .score-area { flex: 1; text-align: center; }
        .score { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        .status { 
            font-size: 0.7rem; 
            background: #1a202c; 
            padding: 4px 10px; 
            border-radius: 12px; 
            color: var(--dim);
        }
        .live-dot { height: 8px; width: 8px; background: var(--danger); border-radius: 50%; display: inline-block; margin-left: 5px; animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* قسم الكويز (Gamification) */
        .quiz-box {
            background: linear-gradient(45deg, #121820, #1a202c);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            border: 1px dashed var(--accent);
        }

        .option {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .option:hover { border-color: var(--accent); background: rgba(0, 255, 136, 0.1); }

        /* شريط التنقل السفلي الاحترافي */
        .nav-bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(18, 24, 32, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-top: 1px solid #1e293b;
            backdrop-filter: blur(10px);
        }
        .nav-btn { color: var(--dim); font-size: 1.3rem; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }

    </style>
</head>
<body>

<header>
    <div class="logo">KORA<span style="color:white">ULTIMATE</span></div>
    <div id="user-points" style="font-size: 0.9rem;"><i class="fas fa-coins" style="color:gold"></i> 0</div>
</header>

<div class="leagues-nav">
    <div class="league-chip active" onclick="fetchMatches('PL')">الدوري الإنجليزي</div>
    <div class="league-chip" onclick="fetchMatches('CL')">دوري الأبطال</div>
    <div class="league-chip" onclick="fetchMatches('SA')">الدوري الإيطالي</div>
    <div class="league-chip" onclick="fetchMatches('FL1')">الدوري الفرنسي</div>
</div>

<div class="container" id="app-content">
    </div>

<div class="nav-bottom">
    <div class="nav-btn active" onclick="showSection('matches')"><i class="fas fa-field-fixed"></i></div>
    <div class="nav-btn" onclick="showSection('quiz')"><i class="fas fa-trophy"></i></div>
    <div class="nav-btn"><i class="fas fa-tv"></i></div>
    <div class="nav-btn"><i class="fas fa-user-ninja"></i></div>
</div>

<script>
    // إعدادات الـ API (تنبيه: ستحتاج لمفتاح حقيقي من football-data.org ليعمل الكود بنسبة 100%)
    const API_KEY = '4eb6e0ffbcbde3b079c5227e9b9676b8'; // ضع مفتاحك هنا
    const BASE_URL = 'https://api.football-data.org/v4/competitions/';

    // بيانات وهمية للاختبار في حال عدم وجود API حالياً
    const mockMatches = {
        'PL': [
            { home: 'أرسنال', away: 'مان سيتي', score: '2 - 2', status: 'LIVE 78\'', logoH: '61', logoA: '65' },
            { home: 'ليفربول', away: 'تشيلسي', score: '1 - 0', status: 'انتهت', logoH: '64', logoA: '61' }
        ]
    };

    async function fetchMatches(leagueCode) {
        const content = document.getElementById('app-content');
        content.innerHTML = '<p style="text-align:center; padding:50px;">جاري الاتصال بالسيرفرات العالمية...</p>';

        try {
            // محاكاة تأخير الشبكة
            setTimeout(() => {
                renderMatches(mockMatches['PL']); 
            }, 800);

            /* الكود الحقيقي عند توفر المفتاح:
            const response = await fetch(`${BASE_URL}${leagueCode}/matches?limit=5`, {
                headers: { 'X-Auth-Token': API_KEY }
            });
            const data = await response.json();
            renderMatches(data.matches);
            */
        } catch (error) {
            content.innerHTML = '<p>خطأ في جلب البيانات. تأكد من اتصال الإنترنت.</p>';
        }
    }

    function renderMatches(matches) {
        const content = document.getElementById('app-content');
        content.innerHTML = '<h3>أهم مباريات اليوم</h3>';
        
        matches.forEach(m => {
            content.innerHTML += `
                <div class="match-card">
                    <div class="team">
                        <img src="https://crests.football-data.org/${m.logoH}.png" alt="">
                        <span>${m.home}</span>
                    </div>
                    <div class="score-area">
                        <div class="score">${m.score}</div>
                        <div class="status">
                            ${m.status.includes('LIVE') ? '<span class="live-dot"></span>' : ''}
                            ${m.status}
                        </div>
                    </div>
                    <div class="team">
                        <img src="https://crests.football-data.org/${m.logoA}.png" alt="">
                        <span>${m.away}</span>
                    </div>
                </div>
            `;
        });
    }

    function showSection(type) {
        const content = document.getElementById('app-content');
        if (type === 'quiz') {
            content.innerHTML = `
                <div class="quiz-box">
                    <h2 style="color:var(--accent)">تحدي المعلومات 🧠</h2>
                    <p style="margin:15px 0">من هو الهداف التاريخي لدوري أبطال أوروبا؟</p>
                    <div class="option" onclick="answer(true)">كريستيانو رونالدو</div>
                    <div class="option" onclick="answer(false)">ليونيل ميسي</div>
                    <div class="option" onclick="answer(false)">روبرت ليفاندوفسكي</div>
                </div>
            `;
        } else {
            fetchMatches('PL');
        }
    }

    let points = 0;
    function answer(correct) {
        if(correct) {
            points += 100;
            alert("إجابة عالمية! حصلت على 100 نقطة 🔥");
        } else {
            alert("للأسف، حاول مرة أخرى!");
        }
        document.getElementById('user-points').innerHTML = `<i class="fas fa-coins" style="color:gold"></i> ${points}`;
    }

    // التشغيل عند البداية
    window.onload = () => fetchMatches('PL');
</script>

</body>
</html>
